auto_remediate:
  - restart_pod
  - clear_cache
  - scale_up_to_2x

always_escalate:
  - data_deletion
  - config_change
  - scale_above_5x
  - security_events

max_retries: 3
blast_radius_threshold: 0.4

watcher:
  poll_interval_seconds: 60
  error_rate_threshold: 5.0
  spl_query: |
    search index=* sourcetype=_json source=sample_incidents.log earliest=-7d
    | spath
    | stats latest(error_rate) as current_value max(error_rate) as peak_value by metric_name
    | eval current_value=if(current_value>5, current_value, peak_value)
    | where current_value > 5

verifier:
  recovery_threshold: 5.0
